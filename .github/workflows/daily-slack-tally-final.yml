name: daily-slack-tally (final)

# 최종 마감 집계: 매일 00:30 KST (15:30 UTC)에 '어제(방금 끝난 하루)'를 완전 집계.
# 야간 직원의 21:00~24:00 업무까지 모두 포함해 그날을 최종 확정한다.
on:
  schedule:
    - cron: '30 15 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  tally-final:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 슬랙 집계 실행 (어제 최종)
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: C09HRUSG4TX
          TALLY_DATE_OFFSET: '-1'
        run: node scripts/fetch-and-tally.js

      - name: 변경 시 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet slack-data.js; then
            echo "변경 없음 — 커밋 생략"
          else
            git add slack-data.js
            git commit -m "chore: 원격 AS 최종 집계 ($(TZ=Asia/Seoul date -d 'yesterday' +%Y-%m-%d))"
            git push
          fi
