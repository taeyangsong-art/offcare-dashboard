name: changelog (커밋 → 공지 업데이트 내역 자동)

# main에 push되면 커밋 메시지로 changelog.js를 생성해 커밋.
# 자기 자신/데이터 파일 변경은 트리거 제외(무한루프·잡음 방지). 커밋 메시지 필터는 스크립트에서.
on:
  push:
    branches: [main]
    paths-ignore:
      - 'changelog.js'
      - 'slack-data.js'
      - 'calendar-data.js'

permissions:
  contents: write

concurrency:
  group: changelog
  cancel-in-progress: false

jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 150   # git log 충분히 확보

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: changelog.js 생성
        run: node scripts/gen-changelog.js

      - name: 변경 시 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet changelog.js; then
            echo "변경 없음 — 커밋 생략"
          else
            git add changelog.js
            git commit -m "docs: changelog 자동 갱신 [skip ci]"
            for i in 1 2 3 4 5; do
              git pull --rebase --autostash origin main && git push && { echo "푸시 성공"; exit 0; }
              echo "경합 재시도 $i..."; sleep $((i*3))
            done
            echo "푸시 5회 실패"; exit 1
          fi
