name: daily-slack-tally (progress)

# 근실시간 진행 집계: 업무시간(09:00~22:50 KST = 00:00~13:50 UTC) 10분마다 '오늘' 집계 + 수동 실행
on:
  schedule:
    - cron: '*/10 0-13 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  tally:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 슬랙 집계 실행 (오늘)
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: C09HRUSG4TX
          TALLY_DATE_OFFSET: '0'
        run: node scripts/fetch-and-tally.js

      - name: 메뉴요청 적재 (대시보드 메뉴등록 카테고리)
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: node scripts/fetch-menu-requests.js || echo "메뉴요청 적재 실패 — 집계는 계속"

      - name: 변경 시 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -z "$(git status --porcelain slack-data.js menu-requests.js menu-files 2>/dev/null)" ]; then
            echo "변경 없음 — 커밋 생략"
          else
            git add slack-data.js
            [ -f menu-requests.js ] && git add menu-requests.js
            [ -d menu-files ] && git add -A menu-files
            git commit -m "chore: 원격 AS 집계 자동 갱신 ($(TZ=Asia/Seoul date +%Y-%m-%d))"
            for i in 1 2 3 4 5 6 7 8; do
              git pull --rebase --autostash origin main && git push && { echo "푸시 성공"; exit 0; }
              echo "푸시 경합 — 재시도 $i..."; sleep $((i*3))
            done
            echo "푸시 8회 실패 — 다음 실행에서 재시도"; exit 1
          fi
