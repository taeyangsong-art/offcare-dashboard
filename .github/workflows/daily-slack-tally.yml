name: daily-slack-tally (progress)

# 근실시간 진행 집계: 업무시간(09:00~22:45 KST = 00:00~13:45 UTC) 30분마다 '오늘' 집계 + 수동 실행
on:
  schedule:
    - cron: '*/30 0-13 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  tally:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 슬랙 집계 실행 (오늘)
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: C09HRUSG4TX
          TALLY_DATE_OFFSET: '0'
        run: node scripts/fetch-and-tally.js

      - name: 변경 시 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet slack-data.js; then
            echo "변경 없음 — 커밋 생략"
          else
            git add slack-data.js
            git commit -m "chore: 원격 AS 집계 자동 갱신 ($(TZ=Asia/Seoul date +%Y-%m-%d))"
            git push
          fi
